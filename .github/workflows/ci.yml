name: CI

on:
    push:
        branches: [main]
    pull_request:
        types: [synchronize, opened, reopened]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
    ci:
        permissions:
            issues: write
            pull-requests: write
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [24.x]

        steps:
            - uses: actions/checkout@v3
            - uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'pnpm'

            - name: Install packages
              run: |
                  pnpm install

            - name: Code Format
              id: codeFormat
              run: |
                  pnpm run format:check

            - name: Unit Test
              id: unitTest
              run: |
                  pnpm run test:unit

            - name: Build
              id: build
              run: |
                  pnpm run build
